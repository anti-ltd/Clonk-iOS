# XcodeGen manifest. `make project` regenerates AppTemplate.xcodeproj from this.
# Keep the manifest as the source of truth — never edit the generated .xcodeproj
# by hand or the next `make project` will clobber it.

name: AppTemplate
options:
  bundleIdPrefix: ltd.anti
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Same Apple Developer team as the rest of our apps. Xcode auto-
    # generates a development provisioning profile on demand. Override
    # at build time with `DEVELOPMENT_TEAM=<id>` on the xcodebuild
    # command line if a fork needs a different team.
    DEVELOPMENT_TEAM: 8248296AJX
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# Local SwiftPM dependency on the iOS UX library. iUX-ios lives one level up.
packages:
  iUX-ios:
    path: ../iUX-ios

targets:
  AppTemplate:
    type: application
    platform: iOS
    sources:
      - Sources/AppTemplate
      # Asset catalog must be a source (not a plain resource) so Xcode
      # runs actool over it and produces Assets.car in the bundle. As
      # a plain resource it would be copied verbatim and iOS wouldn't
      # find the app icon.
      - Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: AppTemplate
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # All four orientations supported — the app is iPad-friendly too,
        # so we let the OS rotate freely.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: iUX-ios
        product: iUXiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.apptemplate
        TARGETED_DEVICE_FAMILY: "1,2"
        # Tell actool which appiconset in the catalog is the app icon.
        # `AppIcon` matches the directory name under Assets.xcassets.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
