# XcodeGen manifest. `make project` regenerates Clink.xcodeproj from this.
# Keep the manifest as the source of truth — never edit the generated .xcodeproj
# by hand or the next `make project` will clobber it.
#
# Clink is a custom iOS keyboard. It ships as two targets plus shared code:
#
#   Clink          — the container app (App Store product). Hosts the
#                    enable flow + theme / layout / sound customization UI.
#   ClinkKeyboard  — the keyboard extension (UIInputViewController). The
#                    actual keyboard that runs inside other apps.
#   Sources/ClinkKit — shared model + App Group storage code, compiled
#                    into BOTH targets (no dynamic framework, so no
#                    extension rpath/embedding pitfalls).
#
# The two processes are isolated; they share state only through the
# App Group `group.ltd.anti.clink`.

name: Clink
options:
  bundleIdPrefix: ltd.anti
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Same Apple Developer team as the rest of our apps. Xcode auto-
    # generates a development provisioning profile on demand. Override
    # at build time with `DEVELOPMENT_TEAM=<id>` on the xcodebuild
    # command line if a fork needs a different team.
    DEVELOPMENT_TEAM: 8248296AJX
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# Local SwiftPM dependency on the iOS UX library. iUX-ios lives one level up.
packages:
  iUX-ios:
    path: ../iUX-ios

targets:
  # ----------------------------------------------------------------
  # Container app — the App Store product.
  # ----------------------------------------------------------------
  Clink:
    type: application
    platform: iOS
    sources:
      - Sources/Clink
      # Shared code compiled directly into the app.
      - Sources/ClinkKit
      # Asset catalog must be a source (not a plain resource) so Xcode
      # runs actool over it and produces Assets.car in the bundle. As
      # a plain resource it would be copied verbatim and iOS wouldn't
      # find the app icon.
      - Resources/Assets.xcassets
      # Privacy manifest (required by App Store since May 2024). Lives in a
      # per-target folder so it lands at the bundle root as PrivacyInfo.xcprivacy.
      - Resources/Privacy/App/PrivacyInfo.xcprivacy
    info:
      path: Resources/Clink-Info.plist
      properties:
        CFBundleDisplayName: Clink
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "12"
        # Export compliance: Clink runs fully offline and implements no
        # encryption of its own (only standard OS-exempt APIs). Declaring this
        # auto-clears App Store Connect's "Missing Compliance" prompt on every
        # build, so we never get asked the encryption question again.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Portrait-only keyboard app. Opt out of iPad multitasking so the
        # validator doesn't demand all 4 orientations (error 90474).
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: Resources/Clink.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ltd.anti.clink
    dependencies:
      - package: iUX-ios
        product: iUXiOS
      # Embeds the keyboard extension into the app bundle's PlugIns dir.
      - target: ClinkKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.clink
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ----------------------------------------------------------------
  # Keyboard extension — the actual keyboard.
  # ----------------------------------------------------------------
  ClinkKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - Sources/ClinkKeyboard
      # Same shared code, compiled into the extension too.
      - Sources/ClinkKit
      # Privacy manifest for the keyboard extension bundle.
      - Resources/Privacy/Keyboard/PrivacyInfo.xcprivacy
    info:
      path: Resources/ClinkKeyboard-Info.plist
      properties:
        CFBundleDisplayName: Clink
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "12"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          # The principal class is marked @objc(KeyboardViewController)
          # so this bare name resolves without a module prefix.
          NSExtensionPrincipalClass: KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: true
            PrefersRightToLeftLayout: false
            PrimaryLanguage: en-US
            # Full Access is *requestable* so users can opt into custom clink
            # sounds + haptics (both need it). It stays OFF until the user
            # flips the toggle in Settings — the keyboard works fully (system
            # click, no haptics) without it, so this is opt-in, not required.
            RequestsOpenAccess: true
    entitlements:
      path: Resources/ClinkKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ltd.anti.clink
    dependencies:
      - package: iUX-ios
        product: iUXiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.clink.keyboard
        TARGETED_DEVICE_FAMILY: "1,2"

