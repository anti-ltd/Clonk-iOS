# XcodeGen manifest. `make project` regenerates Clonk.xcodeproj from this.
# Keep the manifest as the source of truth — never edit the generated .xcodeproj
# by hand or the next `make project` will clobber it.
#
# Clonk is a custom iOS keyboard. It ships as two targets plus shared code:
#
#   Clonk          — the container app (App Store product). Hosts the
#                    enable flow + theme / layout / sound customization UI.
#   ClonkKeyboard  — the keyboard extension (UIInputViewController). The
#                    actual keyboard that runs inside other apps.
#   Sources/ClonkKit — shared model + App Group storage code, compiled
#                    into BOTH targets (no dynamic framework, so no
#                    extension rpath/embedding pitfalls).
#
# The two processes are isolated; they share state only through the
# App Group `group.ltd.anti.clonk`.

name: Clonk
options:
  bundleIdPrefix: ltd.anti
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Same Apple Developer team as the rest of our apps. Xcode auto-
    # generates a development provisioning profile on demand. Override
    # at build time with `DEVELOPMENT_TEAM=<id>` on the xcodebuild
    # command line if a fork needs a different team.
    DEVELOPMENT_TEAM: 8248296AJX
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# Local SwiftPM dependency on the iOS UX library. iUX-ios lives one level up.
packages:
  iUX-ios:
    path: ../iUX-ios

targets:
  # ----------------------------------------------------------------
  # Container app — the App Store product.
  # ----------------------------------------------------------------
  Clonk:
    type: application
    platform: iOS
    sources:
      - Sources/Clonk
      # Shared code compiled directly into the app.
      - Sources/ClonkKit
      # Asset catalog must be a source (not a plain resource) so Xcode
      # runs actool over it and produces Assets.car in the bundle. As
      # a plain resource it would be copied verbatim and iOS wouldn't
      # find the app icon.
      - Resources/Assets.xcassets
    info:
      path: Resources/Clonk-Info.plist
      properties:
        CFBundleDisplayName: Clonk
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Resources/Clonk.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ltd.anti.clonk
    dependencies:
      - package: iUX-ios
        product: iUXiOS
      # Embeds the keyboard extensions into the app bundle's PlugIns dir.
      - target: ClonkKeyboard
      - target: ClonkEmoji
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.clonk
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ----------------------------------------------------------------
  # Keyboard extension — the actual keyboard.
  # ----------------------------------------------------------------
  ClonkKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - Sources/ClonkKeyboard
      # Same shared code, compiled into the extension too.
      - Sources/ClonkKit
    info:
      path: Resources/ClonkKeyboard-Info.plist
      properties:
        CFBundleDisplayName: Clonk
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          # The principal class is marked @objc(KeyboardViewController)
          # so this bare name resolves without a module prefix.
          NSExtensionPrincipalClass: KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeftLayout: false
            PrimaryLanguage: en-US
            # Full Access is *requestable* so users can opt into custom clonk
            # sounds + haptics (both need it). It stays OFF until the user
            # flips the toggle in Settings — the keyboard works fully (system
            # click, no haptics) without it, so this is opt-in, not required.
            RequestsOpenAccess: true
    entitlements:
      path: Resources/ClonkKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ltd.anti.clonk
    dependencies:
      - package: iUX-ios
        product: iUXiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.clonk.keyboard
        TARGETED_DEVICE_FAMILY: "1,2"

  # ----------------------------------------------------------------
  # Emoji keyboard extension — second keyboard, same shared config.
  # ----------------------------------------------------------------
  ClonkEmoji:
    type: app-extension
    platform: iOS
    sources:
      - Sources/ClonkEmoji
      # Same shared code (settings, theme, emoji canvas) as the others.
      - Sources/ClonkKit
    info:
      path: Resources/ClonkEmoji-Info.plist
      properties:
        CFBundleDisplayName: Clonk Emoji
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: EmojiKeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeftLayout: false
            PrimaryLanguage: en-US
            # Emoji needs no network/clipboard, so no Full Access prompt.
            RequestsOpenAccess: false
    entitlements:
      path: Resources/ClonkEmoji.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ltd.anti.clonk
    dependencies:
      - package: iUX-ios
        product: iUXiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.clonk.emoji
        TARGETED_DEVICE_FAMILY: "1,2"
