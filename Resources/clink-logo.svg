<?xml version="1.0" encoding="UTF-8"?>
<!-- Clink mark. Two-tone: tile = theme accent (currentColor), "c" = theme key
     letter color. In-app both are tinted live; here the "c" is white as a stand-in.
     viewBox 0..100. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <rect width="100" height="100" rx="28" ry="28"/>
  <path d="M 67.26 33.32 A 24 24 0 1 0 67.26 66.68"
        fill="none" stroke="#fff" stroke-width="13" stroke-linecap="round"/>
</svg>
