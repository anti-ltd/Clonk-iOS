<?xml version="1.0" encoding="UTF-8"?>
<!-- Clink mark. Monochrome: fill follows currentColor so it can be tinted by theme accent.
     Squircle tile with the "c" knocked out (transparent) via mask. viewBox 0..100. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <mask id="clink-c-cut">
    <rect width="100" height="100" rx="28" ry="28" fill="white"/>
    <path d="M 67.26 33.32 A 24 24 0 1 0 67.26 66.68"
          fill="none" stroke="black" stroke-width="13" stroke-linecap="round"/>
  </mask>
  <rect width="100" height="100" rx="28" ry="28" mask="url(#clink-c-cut)"/>
</svg>
