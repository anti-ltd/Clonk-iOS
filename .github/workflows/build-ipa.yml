name: Build IPA

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout iUX-ios
        run: git clone https://github.com/anti-ltd/iUX-iOS.git ../iUX-ios

      - name: Regenerate Xcode project
        run: make project

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project Clink.xcodeproj \
            -scheme Clink \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          APP=$(find build/DerivedData -name "Clink.app" -not -path "*/\.*" | head -1)
          mkdir -p build/unsigned/Payload
          cp -r "$APP" build/unsigned/Payload/
          cd build/unsigned
          zip -qr ../Clink-unsigned.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clink-unsigned-${{ github.sha }}
          path: build/Clink-unsigned.ipa
          retention-days: 30

      # Create a GitHub Release with the IPA on every push to main (not PRs).
      - name: Create GitHub Release

        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          gh release create "$SHORT" build/Clink-unsigned.ipa \
            --title "Clink $SHORT" \
            --notes "Unsigned IPA built from [\`$SHORT\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})." \
            --prerelease
